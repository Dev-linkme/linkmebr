# Configuração do proxy reverso (HTTP).
# Após rodar setup-ssl.sh, o Certbot adiciona automaticamente o bloco HTTPS.

server {
    listen 80;
    server_name _;

    # Docker internal DNS — lazy resolution (resolve on request, not at startup)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Backend API
    location /api/ {
        set $upstream_backend http://backend:8080;
        proxy_pass         $upstream_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Swagger docs
    location /api-docs {
        set $upstream_backend http://backend:8080;
        proxy_pass         $upstream_backend/api-docs;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        set $upstream_backend http://backend:8080;
        proxy_pass $upstream_backend/health;
    }

    # Recepção de leituras dos dispositivos Labrador (linkme-server)
    location /dados {
        set $upstream_dados http://linkme-api:8000;
        proxy_pass         $upstream_dados/dados;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 1m;
    }

    # Frontend
    location / {
        set $upstream_frontend http://frontend:80;
        proxy_pass         $upstream_frontend/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
