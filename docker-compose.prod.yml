# Uso no Droplet: docker compose -f docker-compose.prod.yml up -d --build
# Portas expostas apenas para localhost — nginx do host faz o proxy com SSL.

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: linkmebr_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - linkmebr_net

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: linkmebr_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 8080
      NODE_ENV: production
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - linkmebr_net

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://linkeme.tec.br/api/v1
    container_name: linkmebr_frontend
    restart: always
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    networks:
      - linkmebr_net

volumes:
  redis_data:

networks:
  linkmebr_net:
    driver: bridge
