services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: linkmebr_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - linkmebr_net

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: linkmebr_backend
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 8080
      NODE_ENV: production
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - linkmebr_net

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://157.245.139.143:8080/api/v1
    container_name: linkmebr_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - linkmebr_net

volumes:
  redis_data:

networks:
  linkmebr_net:
    driver: bridge
